<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlazePixel Start</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <!-- Ensure this path is correct for your odometer CSS -->
    <link rel="stylesheet" href="./css/odometer_basic.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #d0bcff;
            --accent: #d0bcff;
            --surface: #1a1625;
            --on-surface: #ede1f0;
            --bg: #1a1625;
            --card-bg: rgba(208, 188, 255, 0.08);
            --border: rgba(208, 188, 255, 0.15);
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1625 0%, #2d1b4e 50%, #1a1625 100%);
            background-attachment: fixed;
            color: var(--on-surface);
            position: relative;
            overflow: hidden;
        }

        /* Animated RGB Orbs - KEPT EXACTLY THE SAME */
        body::before {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: float1 15s infinite ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(0, 255, 100, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -50px;
            right: -50px;
            animation: float2 20s infinite ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(100px, 100px); }
            50% { transform: translate(200px, 0); }
            75% { transform: translate(100px, -100px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-100px, -100px); }
            50% { transform: translate(-200px, 0); }
            75% { transform: translate(-100px, 100px); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- CLOCK INTEGRATION --- */
        .clock-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .clock-container {
            text-align: center;
            background: var(--card-bg); /* Kept your exact background */
            padding: 2rem 3rem;
            border-radius: 28px;
            border: 1.5px solid var(--border);
            box-shadow: 0 0 20px rgba(208, 188, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .clock {
            font-size: 5rem;
            font-weight: 500;
            color: var(--primary);
            display: flex;
            align-items: baseline;
            justify-content: center;
            letter-spacing: -2px;
        }

        /* Odometer specific styling */
        .odometer {
            min-width: 1.2em;
            text-align: center;
            line-height: 1.1 !important;
        }

        /* Force font into generated digits */
        .odometer-digit, .odometer-value, .odometer-label {
            font-family: 'Outfit', sans-serif !important;
            padding: 0 6px !important; /* Adds just enough side space for the font */
        }

        /* Clean up odometer background */
        .odometer.odometer-auto-theme, .odometer.odometer-theme-default {
            background: transparent !important;
            padding: 0 !important;
        }

        .colon {
            margin: 0 5px;
            animation: blink 1s infinite;
            display: inline-block;
            transform: translateY(-5px); /* Centers colon with numbers */
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }

        .seconds.odometer {
            font-size: 2rem;
            margin-left: 10px;
            color: rgba(208, 188, 255, 0.7);
        }

        .date {
            margin-top: 15px;
            font-size: 1.2rem;
            color: var(--on-surface);
            letter-spacing: 1px;
            width: 100%;
        }

        /* Search Bar */
        .search-container {
            width: 100%;
            display: flex;
            gap: 12px;
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: rgba(208, 188, 255, 0.05);
            border: 1.5px solid rgba(208, 188, 255, 0.2);
            border-radius: 28px;
            transition: all 0.3s ease;
        }

        .search-box:hover {
            background: rgba(208, 188, 255, 0.1);
            border-color: rgba(208, 188, 255, 0.3);
        }

        .search-box:focus-within {
            background: rgba(208, 188, 255, 0.15);
            border-color: #d0bcff;
            box-shadow: 0 0 20px rgba(208, 188, 255, 0.2);
        }

        .search-icon {
            width: 20px;
            height: 20px;
            opacity: 0.7;
            color: #d0bcff;
            flex-shrink: 0;
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--on-surface);
            font-size: 16px;
            font-family: inherit;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--on-surface);
            opacity: 0.5;
        }

        /* Weather Widget */
        .weather-widget {
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            width: 200px;
            text-align: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .weather-widget:hover {
            background: rgba(208, 188, 255, 0.12);
            border-color: rgba(208, 188, 255, 0.25);
            box-shadow: 0 0 20px rgba(208, 188, 255, 0.15);
        }

        .weather-temp {
            font-size: 48px;
            font-weight: 300;
            color: #d0bcff;
            margin: 12px 0;
        }

        .weather-city {
            font-size: 14px;
            color: var(--on-surface);
            opacity: 0.8;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .weather-desc {
            font-size: 13px;
            color: var(--on-surface);
            opacity: 0.6;
        }

        .weather-icon {
            font-size: 48px;
            margin: 12px 0;
        }

        .footer {
            margin-top: auto;
            text-align: center;
            font-size: 12px;
            color: var(--on-surface);
            opacity: 0.5;
            padding-top: 20px;
        }

        @media (max-width: 600px) {
            .clock { font-size: 3.5rem; }
            .weather-widget { width: 160px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Clock -->
        <div class="clock-widget">
            <div class="clock-container">
<div class="clock">
    <span id="hours" class="odometer">00</span>
    <span class="colon">:</span>
    <span id="minutes" class="odometer">00</span>
    <span id="seconds" class="odometer seconds">00</span>
</div>
                <div class="date" id="date">Monday, Jan 1</div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-container">
            <form class="search-box" onsubmit="search(event)">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" class="search-input" placeholder="Search Google..." id="searchInput" autocomplete="off">
            </form>
        </div>

        <!-- Weather -->
        <div class="weather-widget" id="weather">
            <div class="weather-icon" id="weatherIcon">☁️</div>
            <div class="weather-city" id="weatherCity">Loading...</div>
            <div class="weather-temp" id="weatherTemp">--°</div>
            <div class="weather-desc" id="weatherDesc">--</div>
        </div>
    </div>

    <div class="footer">
    <p class="font-mono text-[9px] md:text-[10px] tracking-[0.2em] uppercase opacity-20 hover:opacity-100 transition-all duration-500 cursor-default pointer-events-auto inline-block whitespace-nowrap">
        © 2026 <span id="footer-brand" class="text-emerald-500 transition-colors duration-300">BlazePixel</span><span class="hidden sm:inline"> - All rights reserved</span>
    </p>
    </div>

    <script src="./js/odometer.js"></script>

    <script>
        // Initialize Odometers
// The '(dd)' format is the secret sauce for leading zeros
const odH = new Odometer({ 
    el: document.querySelector('#hours'), 
    value: 0, 
    format: '(dd)' 
});
const odM = new Odometer({ 
    el: document.querySelector('#minutes'), 
    value: 0, 
    format: '(dd)' 
});
const odS = new Odometer({ 
    el: document.querySelector('#seconds'), 
    value: 0, 
    format: '(dd)' 
});

function updateClock() {
    const now = new Date();
    
    // Get raw values
    let h = now.getHours();
    let m = now.getMinutes();
    let s = now.getSeconds();

    // Force Odometer to see two digits by updating with a string-like behavior
    // or manually prepending a 0 if the library is stripping it.
    odH.update(h);
    
    // TRICK: If minutes are less than 10, Odometer needs to be forced 
    // to render the first digit as 0. 
    odM.update(m < 10 ? "0" + m : m);
    odS.update(s < 10 ? "0" + s : s);
    
    const options = { weekday: 'long', month: 'short', day: 'numeric' };
    document.getElementById('date').textContent = now.toLocaleDateString(undefined, options);
}
        setInterval(updateClock, 1000);
        updateClock();

        function search(event) {
            event.preventDefault();
            const query = document.getElementById('searchInput').value;
            if (query) window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        }

async function getWeather() {
    const weatherCity = document.getElementById('weatherCity');
    const weatherTemp = document.getElementById('weatherTemp');
    const weatherDesc = document.getElementById('weatherDesc');
    const weatherIcon = document.getElementById('weatherIcon');

    // 1. Check if we already have saved coordinates
    const savedLat = localStorage.getItem('weatherLat');
    const savedLon = localStorage.getItem('weatherLon');
    const savedCity = localStorage.getItem('weatherCityName');

    if (savedLat && savedLon) {
        // If we have saved data, use it immediately
        fetchWeatherData(savedLat, savedLon, savedCity || 'Your Location');
    } else {
        // 2. Otherwise, ask for permission
        if ('geolocation' in navigator) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                
                // Get the city name via reverse geocoding
                const geoResponse = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                const geoData = await geoResponse.json();
                const city = geoData.address?.city || geoData.address?.town || 'Your Location';

                // 3. Save to localStorage so we don't ask again
                localStorage.setItem('weatherLat', latitude);
                localStorage.setItem('weatherLon', longitude);
                localStorage.setItem('weatherCityName', city);

                fetchWeatherData(latitude, longitude, city);
            }, (error) => {
                weatherCity.textContent = "Location Denied";
                console.error("Error getting location:", error);
            });
        }
    }
}

// Separate function to handle the API call
async function fetchWeatherData(lat, lon, cityName) {
    try {
        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`);
        const data = await response.json();
        
        document.getElementById('weatherTemp').textContent = `${Math.round(data.current.temperature_2m)}°`;
        document.getElementById('weatherCity').textContent = cityName;
        document.getElementById('weatherDesc').textContent = getWeatherDescription(data.current.weather_code);
        document.getElementById('weatherIcon').textContent = getWeatherIcon(data.current.weather_code);
    } catch (e) {
        console.error('Weather API failed', e);
    }
}

        function getWeatherIcon(code) {
            const icons = { 0: '☀️', 1: '🌤️', 2: '🌤️', 3: '☁️', 45: '🌫️', 48: '🌫️', 51: '🌧️', 61: '🌧️', 71: '❄️', 95: '⛈️' };
            return icons[code] || '☁️';
        }

        function getWeatherDescription(code) {
            const desc = { 0: 'Clear', 1: 'Mostly Clear', 3: 'Overcast', 45: 'Foggy', 61: 'Rainy', 71: 'Snowy', 95: 'Thunderstorm' };
            return desc[code] || 'Cloudy';
        }

        getWeather();
    </script>
</body>
</html>
