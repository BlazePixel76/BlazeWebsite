<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlazePixel Start</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔎</text></svg>">
    <link rel="manifest" href="./json/manifest.json">
    <meta name="theme-color" content="#d0bcff">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB5PSIuOWVtIiBmb250LXNpemU9IjkwIj5🔎PC90ZXh0Pjwvc3ZnPg==">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #d0bcff;
            --accent: #d0bcff;
            --surface: #1a1625;
            --on-surface: #ede1f0;
            --bg: #1a1625;
        }

html, body {
            width: 100%;
            height: 100%;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0a1a 0%, #1a0f2e 25%, #2d1b4e 50%, #1a0f2e 75%, #0f0a1a 100%);
            background-attachment: fixed;
            color: var(--on-surface);
            position: relative;
            overflow: hidden;
        }

        /* Smaller laptop / short viewport: allow scrolling and ensure greeting is reachable */
        @media (max-height: 820px), (max-width: 1366px) {
            html, body {
                /* Override the base "overflow: hidden" reliably */
                overflow: visible !important;
                overflow-y: auto !important;
                overflow-x: hidden !important;
                height: auto;
            }

            body {
                justify-content: flex-start;
                /* Prevent flex layout + 100vh from creating "unreachable top" on some viewport calculations */
                min-height: auto;
                padding-top: 0;
                padding-bottom: 10px;
            }

            .container {
                margin-top: 0;
                padding-top: 0;
                gap: 26px;
                padding-bottom: 10px;
                overflow: visible;
            }

            .clock-container {
                padding: 2.2rem 2.6rem;
                border-radius: 28px;
                gap: 10px;
            }

            .clock {
                font-size: 5.5rem;
            }

            .greeting-container {
                padding: 1.05rem 2.2rem;
            }

            .weather-widget, .battery-widget {
                padding: 22px;
            }

            .widgets-row {
                margin-top: 0;
            }
        }

        /* Enhanced RGB Orbs with bigger, smoother animations */
        body::before {
            content: '';
            position: fixed;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(255, 0, 150, 0.35) 0%, rgba(255, 0, 100, 0.1) 40%, transparent 70%);
            border-radius: 50%;
            top: -250px;
            left: -250px;
            animation: float1 25s infinite cubic-bezier(0.4, 0.0, 0.6, 1.0);
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
        }

        body::after {
            content: '';
            position: fixed;
            width: 480px;
            height: 480px;
            background: radial-gradient(circle, rgba(0, 200, 255, 0.3) 0%, rgba(100, 150, 255, 0.1) 40%, transparent 70%);
            border-radius: 50%;
            bottom: -200px;
            right: -200px;
            animation: float2 28s infinite cubic-bezier(0.4, 0.0, 0.6, 1.0);
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(200px, 150px) scale(1.1); }
            50% { transform: translate(300px, 50px) scale(0.95); }
            75% { transform: translate(150px, -150px) scale(1.05); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-200px, -150px) scale(1.05); }
            50% { transform: translate(-300px, -50px) scale(0.95); }
            75% { transform: translate(-150px, 150px) scale(1.1); }
        }

        /* Green orb */
        .container::before {
            content: '';
            position: fixed;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(100, 255, 150, 0.25) 0%, rgba(50, 200, 100, 0.05) 40%, transparent 70%);
            border-radius: 50%;
            top: 20%;
            right: -150px;
            animation: float3 26s infinite cubic-bezier(0.4, 0.0, 0.6, 1.0);
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
        }

        @keyframes float3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-200px, 200px) scale(0.95); }
            50% { transform: translate(-250px, 100px) scale(1.1); }
            75% { transform: translate(-150px, -200px) scale(1.05); }
        }

        .widgets-row {
            display: flex;
            gap: clamp(12px, 4vw, 24px);
            align-items: stretch;
            justify-content: center;
            margin-top: 20px;
        }

        /* Desktop: side-by-side (default) */
        @media (min-width: 1024px) {
            .widgets-row {
                flex-direction: row;
            }
        }

        /* Tablet: side-by-side */
        @media (min-width: 769px) and (max-width: 1023px) {
            .widgets-row {
                flex-direction: row;
            }
        }

        /* Mobile: vertical stack - FORCE for all <=768px */
        @media (max-width: 768px) {
            .widgets-row {
                flex-direction: column !important;
                gap: 20px !important;
            }
            
            .widgets-row > * {
                width: 100% !important;
                max-width: 280px;
            }
        }

        /* Extra small mobile */
        @media (max-width: 480px) {
            .widgets-row {
                gap: 16px !important;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 45px;
            align-items: center;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Clock */
        .clock-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .greeting-widget {
            margin-bottom: 16px;
        }

        .greeting-container {
            text-align: center;
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.12) 0%, rgba(208, 188, 255, 0.06) 100%);
            padding: 1.25rem 3rem;
            border-radius: 28px;
            border: 1.5px solid rgba(208, 188, 255, 0.3);
            box-shadow: 0 8px 32px rgba(208, 188, 255, 0.15);
            backdrop-filter: blur(20px);
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            font-weight: 500;
            color: var(--primary);
            letter-spacing: 0.5px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .greeting-container:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 48px rgba(208, 188, 255, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            border-color: rgba(208, 188, 255, 0.6);
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.22) 0%, rgba(208, 188, 255, 0.14) 100%);
        }

        .clock-container {
            text-align: center;
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.15) 0%, rgba(208, 188, 255, 0.08) 100%);
            padding: 3rem 4rem;
            border-radius: 36px;
            border: 1.5px solid rgba(208, 188, 255, 0.25);
            box-shadow: 0 12px 48px rgba(208, 188, 255, 0.15), inset 0 1px 0 rgba(208, 188, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(24px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .clock-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s ease;
        }

        .clock-container:hover::before {
            left: 100%;
        }

        .clock-container:hover {
            border-color: rgba(208, 188, 255, 0.55);
            box-shadow: 0 24px 72px rgba(208, 188, 255, 0.35), 0 0 0 1px rgba(208, 188, 255, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.25);
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.25) 0%, rgba(208, 188, 255, 0.14) 100%);
            transform: translateY(-8px) scale(1.025);
        }

        .clock {
            font-size: 7rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -4px;
            font-family: 'Outfit', sans-serif;
            text-shadow: 0 0 40px rgba(208, 188, 255, 0.5);
            font-variant-numeric: tabular-nums;
        }

        .colon {
            margin: 0 12px;
            animation: pulse-blink 1.2s infinite;
            display: inline-block;
            color: var(--primary);
        }

        @keyframes pulse-blink {
            0%, 49% { 
                opacity: 1;
                text-shadow: 0 0 20px rgba(208, 188, 255, 0.8), 0 0 40px rgba(208, 188, 255, 0.4);
            }
            50%, 100% { 
                opacity: 0.15;
                text-shadow: 0 0 5px rgba(208, 188, 255, 0.2);
            }
        }

        .date {
            margin-top: 4px;
            font-size: 1.15rem;
            color: var(--on-surface);
            letter-spacing: 1.5px;
            font-weight: 600;
            opacity: 0.9;
            text-transform: uppercase;
        }

        /* Search History Dropdown */
        .search-container {
            width: 100%;
            display: flex;
            gap: 12px;
            position: relative;
        }

        .search-wrapper {
            flex: 1;
            position: relative;
        }

        .search-history {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.08) 0%, rgba(208, 188, 255, 0.04) 100%);
            border: 1.5px solid rgba(208, 188, 255, 0.3);
            border-top: none;
            border-radius: 0 0 32px 32px;
            max-height: 280px;
            overflow-y: auto;
            backdrop-filter: blur(15px);
            z-index: 100;
            margin-top: -1.5px;
            display: none;
            box-shadow: 0 12px 48px rgba(208, 188, 255, 0.2), inset 0 1px 0 rgba(208, 188, 255, 0.1);
        }

        .search-history::-webkit-scrollbar {
            width: 6px;
        }

        .search-history::-webkit-scrollbar-track {
            background: transparent;
        }

        .search-history::-webkit-scrollbar-thumb {
            background: rgba(208, 188, 255, 0.3);
            border-radius: 3px;
        }

        .search-history::-webkit-scrollbar-thumb:hover {
            background: rgba(208, 188, 255, 0.5);
        }

        .search-history.show {
            display: block;
            animation: slideDownSmooth 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideDownSmooth {
            from {
                opacity: 0;
                transform: translateY(-15px) scaleY(0.85);
            }
            to {
                opacity: 1;
                transform: translateY(0) scaleY(1);
            }
        }

        .search-history-item {
            padding: 14px 24px;
            color: var(--on-surface);
            cursor: pointer;
            border-bottom: 1px solid rgba(208, 188, 255, 0.08);
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            position: relative;
            overflow: hidden;
        }

        .search-history-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.6) 0%, rgba(208, 188, 255, 0.2) 100%);
            transform: scaleY(0);
            transform-origin: center;
            transition: transform 0.25s ease;
        }

        .search-history-item:hover::before {
            transform: scaleY(1);
        }

        .search-history-item:last-child {
            border-bottom: none;
        }

        .search-history-item:hover {
            background: linear-gradient(90deg, rgba(208, 188, 255, 0.12) 0%, transparent 100%);
            color: #d0bcff;
            padding-left: 28px;
        }

        .search-history-item span:first-child {
            transition: all 0.2s ease;
        }

        .search-history-item:hover span:first-child {
            text-shadow: 0 0 12px rgba(208, 188, 255, 0.4);
        }

        .search-history-item .delete-btn {
            opacity: 0;
            cursor: pointer;
            font-size: 13px;
            color: rgba(208, 188, 255, 0.5);
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .search-history-item:hover .delete-btn {
            opacity: 1;
            color: #d0bcff;
            background: rgba(208, 188, 255, 0.15);
        }

        .search-history-item .delete-btn:hover {
            transform: scale(1.15) rotate(90deg);
            background: rgba(208, 188, 255, 0.25);
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 24px;
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.08) 0%, rgba(208, 188, 255, 0.04) 100%);
            border: 1.5px solid rgba(208, 188, 255, 0.22);
            border-radius: 32px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(15px);
        }

        .search-wrapper:has(#searchInput:focus) .search-box:not(.has-history) {
            border-radius: 32px;
            border-bottom: 1.5px solid rgba(208, 188, 255, 0.22);
        }
        
        .search-wrapper:has(#searchInput:focus.has-history) .search-box {
            border-radius: 32px 32px 0 0;
            border-bottom: none;
        }

        .search-box:hover {
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.12) 0%, rgba(208, 188, 255, 0.07) 100%);
            border-color: rgba(208, 188, 255, 0.35);
            box-shadow: 0 8px 32px rgba(208, 188, 255, 0.12);
        }

        .search-box:focus-within:not(.has-history) {
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.15) 0%, rgba(208, 188, 255, 0.1) 100%);
            border-color: #d0bcff;
            box-shadow: 0 12px 48px rgba(208, 188, 255, 0.25), inset 0 1px 0 rgba(208, 188, 255, 0.2);
            border-radius: 32px;
        }
        
        .search-box:focus-within.has-history {
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.15) 0%, rgba(208, 188, 255, 0.1) 100%);
            border-color: #d0bcff;
            border-bottom: none;
            box-shadow: 0 12px 48px rgba(208, 188, 255, 0.25), inset 0 1px 0 rgba(208, 188, 255, 0.2);
            border-radius: 32px 32px 0 0;
        }

        .search-icon {
            width: 22px;
            height: 22px;
            opacity: 0.75;
            color: #d0bcff;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .search-box:focus-within .search-icon {
            opacity: 1;
            filter: drop-shadow(0 0 8px rgba(208, 188, 255, 0.4));
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--on-surface);
            font-size: 16px;
            font-family: inherit;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--on-surface);
            opacity: 0.5;
        }

        /* Weather Widget */
        .weather-widget {
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.12) 0%, rgba(208, 188, 255, 0.06) 100%);
            border: 1.5px solid rgba(208, 188, 255, 0.22);
            border-radius: 28px;
            padding: 28px;
            width: 220px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
        }

        .weather-widget {
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.12) 0%, rgba(208, 188, 255, 0.06) 100%);
            border: 1.5px solid rgba(208, 188, 255, 0.22);
            border-radius: 28px;
            padding: 28px;
            width: 220px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .weather-widget::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .weather-widget:hover {
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.2) 0%, rgba(208, 188, 255, 0.12) 100%);
            border-color: rgba(208, 188, 255, 0.5);
            box-shadow: 0 20px 64px rgba(208, 188, 255, 0.3), inset 0 1px 0 rgba(255,255,255,0.2);
            transform: translateY(-6px) scale(1.02);
        }

        .weather-widget:hover::before {
            opacity: 1;
        }

        .weather-temp {
            font-size: 52px;
            font-weight: 300;
            color: #d0bcff;
            margin: 12px 0;
            text-shadow: 0 0 20px rgba(208, 188, 255, 0.3);
        }

        .weather-city {
            font-size: 14px;
            color: var(--on-surface);
            opacity: 0.85;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: 0.8px;
        }

        .weather-desc {
            font-size: 13px;
            color: var(--on-surface);
            opacity: 0.65;
            letter-spacing: 0.5px;
        }

        .weather-icon {
            font-size: 52px;
            margin: 8px 0;
            animation: float-icon 3s ease-in-out infinite;
        }

        /* Battery Widget - Step 1/6 */
        .battery-widget {
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.12) 0%, rgba(208, 188, 255, 0.06) 100%);
            border: 1.5px solid rgba(208, 188, 255, 0.22);
            border-radius: 28px;
            padding: 28px;
            width: 220px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
        }

        .battery-widget:not(.show) {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInBattery 0.6s ease forwards;
        }

        .battery-widget:hover {
            background: linear-gradient(135deg, rgba(208, 188, 255, 0.15) 0%, rgba(208, 188, 255, 0.08) 100%);
            border-color: rgba(208, 188, 255, 0.35);
            box-shadow: 0 12px 48px rgba(208, 188, 255, 0.18);
            transform: translateY(-4px);
        }

        .battery-icon {
            font-size: 52px;
            margin: 8px 0;
            animation: float-icon 3s ease-in-out infinite;
        }

        .battery-percent {
            font-size: 52px;
            font-weight: 300;
            color: #d0bcff;
            margin: 12px 0;
            text-shadow: 0 0 20px rgba(208, 188, 255, 0.3);
        }

        .battery-label {
            font-size: 14px;
            color: var(--on-surface);
            opacity: 0.85;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .battery-status {
            font-size: 13px;
            color: var(--on-surface);
            opacity: 0.65;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        @keyframes fadeInBattery {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float-icon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .footer {
            margin-top: auto;
            text-align: center;
            font-size: 11px;
            color: var(--on-surface);
            opacity: 0.4;
            padding-top: 20px;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
        }

        .footer:hover {
            opacity: 0.8;
        }

        /* FULL MOBILE FIX (No Cutoffs) */
        @media (max-width: 600px) {
            html, body {
                overflow-y: auto;
                overflow-x: hidden;
            }
            body {
                justify-content: flex-start;
                padding-top: 40px;
                padding-bottom: 40px;
            }
            
            .container {
                gap: 25px;
            }

            .clock { 
                font-size: 3.8rem;
                letter-spacing: -2px;
            }

            .colon {
                margin: 0 4px;
            }

            .clock-container {
                padding: 1.8rem 2rem;
                border-radius: 24px;
                gap: 8px;
            }

            .date {
                font-size: 0.9rem;
                letter-spacing: 1px;
            }

            .search-box {
                padding: 12px 18px;
                border-radius: 28px;
            }

            .widgets-row {
                flex-direction: column;
                gap: 16px;
                width: 100%;
                align-items: center;
            }

            .weather-widget, .battery-widget { 
                width: 100%;
                max-width: 280px;
                padding: 20px;
            }

            .weather-icon, .battery-icon {
                font-size: 40px;
            }

            .weather-temp, .battery-percent {
                font-size: 38px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Greeting + Clock -->
        <div class="greeting-clock-group">
            <div class="greeting-widget">
                <div class="greeting-container" id="greeting">
                    Good Morning, User ☀️
                </div>
            </div>
            <div class="clock-widget">
                <div class="clock-container">
                    <div class="clock">
                        <span id="time">00:00:00</span>
                    </div>
                    <div class="date" id="date">Monday, Jan 1</div>
                </div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-container">
            <div class="search-wrapper">
                <form class="search-box" onsubmit="search(event)">
<svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21 -4.35 -4.35"></path>
                    </svg>
                    <input type="text" class="search-input" placeholder="Search Google..." id="searchInput" autocomplete="off">
                </form>
                <div class="search-history" id="searchHistory"></div>
            </div>
        </div>

        <!-- Weather + Battery Row -->
        <div class="widgets-row">
            <!-- Weather -->
            <div class="weather-widget" id="weather">
                <div class="weather-icon" id="weatherIcon">☁️</div>
                <div class="weather-city" id="weatherCity">Loading...</div>
                <div class="weather-temp" id="weatherTemp">--°</div>
                <div class="weather-desc" id="weatherDesc">--</div>
            </div>

            <!-- Battery Monitor -->
            <div class="battery-widget" id="battery">
                <div class="battery-icon" id="batteryIcon">🔋</div>
                <div class="battery-label">Battery</div>
                <div class="battery-percent" id="batteryPercent">--%</div>
                <div class="battery-status" id="batteryStatus">Checking...</div>
            </div>
        </div>
    </div>

    <div class="footer" style="display: flex; flex-direction: column; gap: 4px; align-items: center;">
        <div>© 2026 <span class="emerald-text">BLAZEPIXEL</span> - ALL RIGHTS RESERVED</div>
        <div style="font-size: 10px; opacity: 0.6;">
            <span style="cursor: pointer; margin-right: 12px;" onclick="window.location.href='index.html';" title="My Website">🌐 My Website</span>
        </div>
    </div>

    <style>
        .emerald-text {
            color: #10b981;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
            letter-spacing: 1px;
        }

        .footer:hover .emerald-text {
            text-shadow: 0 0 16px rgba(16, 185, 129, 0.8);
            transform: scale(1.05);
        }
    </style>

    <script>
        // Search History Management
        const searchInput = document.getElementById('searchInput');
        const searchHistory = document.getElementById('searchHistory');
        const MAX_HISTORY = 6;

        function loadSearchHistory() {
            const saved = localStorage.getItem('searchHistory');
            return saved ? JSON.parse(saved) : [];
        }

        function saveSearchHistory(history) {
            localStorage.setItem('searchHistory', JSON.stringify(history.slice(0, MAX_HISTORY)));
        }

        function displaySearchHistory() {
            const history = loadSearchHistory();
            const activeQuery = searchInput.value.toLowerCase().trim();
            
            let filtered = history;
            if (activeQuery) {
                filtered = history.filter(item => item.toLowerCase().includes(activeQuery));
            } else {
                filtered = history.slice(0, 6);
            }

            const searchBox = document.querySelector('.search-box');

            if (!filtered.length) {
                searchHistory.classList.remove('show');
                searchBox?.classList.remove('has-history');
                return;
            }

            searchHistory.innerHTML = filtered.map((item, idx) => {
                const safeItem = escapeHtml(item);
                return `
                    <div class="search-history-item" data-item="${safeItem}" data-index="${idx}">
                        <span class="search-item-text">${safeItem}</span>
                        <span class="delete-btn" data-item="${safeItem}">✕</span>
                    </div>`;
            }).join('');

            searchHistory.classList.add('show');
            searchBox?.classList.add('has-history');
        }

        searchHistory.addEventListener('click', (e) => {
            const clickedItem = e.target.closest('.search-history-item');
            if (!clickedItem) return;

            e.preventDefault();
            e.stopPropagation();

            // 🌀 Loading feedback
            clickedItem.style.opacity = '0.6';
            clickedItem.style.pointerEvents = 'none';

            const deleteBtnClicked = e.target.closest('.delete-btn');
            if (deleteBtnClicked) {
                const queryToDelete = deleteBtnClicked.dataset.item;
                let history = loadSearchHistory();
                history = history.filter(item => item !== queryToDelete);
                saveSearchHistory(history);
                displaySearchHistory();
                setTimeout(() => clickedItem.style.opacity = '1', 200);
                return;
            }

            const searchQuery = clickedItem.dataset.item || 
                               clickedItem.querySelector('.search-item-text')?.textContent?.trim();
            
            if (searchQuery?.trim()) {
                // Brief loading before redirect
                setTimeout(() => {
                    window.location.href = `https://www.google.com/search?q=${encodeURIComponent(searchQuery.trim())}`;
                }, 150);
            } else {
                clickedItem.style.opacity = '1';
                clickedItem.style.pointerEvents = 'auto';
            }
        });

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // ⏱️ Debounced search (300ms) - smooth performance
        let searchTimeout;
        const debouncedSearch = () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(displaySearchHistory, 300);
        };
        searchInput.addEventListener('input', debouncedSearch);
        searchInput.addEventListener('focus', displaySearchHistory);
        searchInput.addEventListener('blur', () => {
            setTimeout(() => {
                searchHistory.classList.remove('show');
            }, 200);
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-wrapper')) {
                searchHistory.classList.remove('show');
            }
        });

        let nameModalShown = false; // Global flag to prevent loops
        
        function updateGreeting() {
            const now = new Date();
            const hour = now.getHours();
            
            let timeOfDay = '';
            let emoji = '';
            
            if (hour < 12) {
                timeOfDay = 'Morning';
                emoji = '☀️';
            } else if (hour < 17) {
                timeOfDay = 'Afternoon';
                emoji = '🌤️';
            } else if (hour < 20) {
                timeOfDay = 'Evening';
                emoji = '🌆';
            } else {
                timeOfDay = 'Night';
                emoji = '🌙';
            }
            
            // Check name FIRST before showing modal
            if (!localStorage.getItem('userName') && !nameModalShown) {
                nameModalShown = true;
                showNameModal();
                return;
            }
            
            let userName = localStorage.getItem('userName') || 'BlazePixel';
            
            // URL override
            const urlParams = new URLSearchParams(window.location.search);
            const nameParam = urlParams.get('name') || urlParams.get('user');
            if (nameParam) {
                userName = nameParam.trim();
                localStorage.setItem('userName', userName);
            }
            
            document.getElementById('greeting').textContent = `Good ${timeOfDay} ${emoji}, ${userName}!`;
        }

function showNameModal() {
            // Custom glassmorphism popup - FIXED! Event delegation + proper IDs
            const modal = document.createElement('div');
            modal.id = 'nameModal';
            modal.className = 'name-modal-overlay';
            modal.innerHTML = `
                <div class="name-modal-container">
                    <div class="name-modal-glow"></div>
                    <div class="name-modal-title">Welcome! 👋</div>
                    <div class="name-modal-subtitle">What would you like to be called?</div>
                    <input id="nameInputModal" type="text" placeholder="BlazePixel..." maxlength="25">
                    <div class="name-modal-buttons">
                        <button id="saveNameBtn">Save ✨</button>
                        <button id="skipNameBtn">Skip (BlazePixel)</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Style injection - more reliable
            const style = document.createElement('style');
            style.textContent = `
                .name-modal-overlay {
                    position: fixed; inset: 0; 
                    background: rgba(26,22,37,0.9); 
                    backdrop-filter: blur(30px); 
                    z-index: 10001; display: flex; 
                    align-items: center; justify-content: center;
                    font-family: 'Outfit', sans-serif;
                }
                .name-modal-container {
                    background: linear-gradient(135deg, rgba(208,188,255,0.3) 0%, rgba(208,188,255,0.18) 100%);
                    border: 2px solid rgba(208,188,255,0.7); 
                    border-radius: 32px; padding: 2.5rem 2rem; 
                    max-width: 95vw; width: 95%; text-align: center; max-height: 90vh; overflow-y: auto;
                    backdrop-filter: blur(40px); 
                    box-shadow: 0 50px 120px rgba(0,0,0,0.7);
                    position: relative; animation: modalSlideIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
                }
                .name-modal-glow {
                    position: absolute; inset: 0; 
                    background: radial-gradient(circle at 25% 25%, rgba(208,188,255,0.4) 0%, transparent 60%);
                    pointer-events: none; opacity: 0.6;
                }
                .name-modal-title {
                    font-size: clamp(1.8rem, 6vw, 2.2rem); font-weight: 800; 
                    color: #d0bcff; margin-bottom: 0.8rem; 
                    text-shadow: 0 0 30px rgba(208,188,255,0.8);
                    position: relative; z-index: 1;
                }
                .name-modal-subtitle {
                    color: #ede1f0; margin-bottom: 2rem; 
                    opacity: 0.95; font-size: clamp(1rem, 4vw, 1.2rem); line-height: 1.6;
                    position: relative; z-index: 1;
                }
                #nameInputModal {
                    width: 100%; padding: clamp(1rem, 4vw, 1.4rem) clamp(1.5rem, 5vw, 2rem); margin-bottom: 1.8rem;
                    background: rgba(255,255,255,0.15); 
                    border: 2px solid rgba(208,188,255,0.6); border-radius: 24px; 
                    color: #fff; font-size: clamp(1rem, 4vw, 1.2rem); font-family: 'Outfit', sans-serif; 
                    font-weight: 500; backdrop-filter: blur(25px); 
                    outline: none; transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
                    position: relative; z-index: 1;
                }
                #nameInputModal:focus {
                    border-color: #d0bcff; box-shadow: 0 0 0 4px rgba(208,188,255,0.3);
                    transform: scale(1.02);
                }
                #nameInputModal::placeholder { color: rgba(255,255,255,0.6); }
                .name-modal-buttons {
                    display: flex; gap: 1rem; justify-content: center; position: relative; z-index: 1;
                }
                .name-modal-buttons button {
                    padding: 1rem 2rem; border-radius: 20px; 
                    font-weight: 700; font-size: clamp(0.95rem, 3.5vw, 1.05rem); cursor: pointer; 
                    font-family: 'Outfit', sans-serif; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
                    position: relative; z-index: 1;
                }
                #saveNameBtn {
                    background: linear-gradient(135deg, #d0bcff 0%, #c4b5fd 100%); 
                    border: none; color: #1a1625; 
                    box-shadow: 0 12px 36px rgba(208,188,255,0.5);
                    text-transform: uppercase; letter-spacing: 0.5px;
                }
                #saveNameBtn:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 20px 48px rgba(208,188,255,0.7); }
                #skipNameBtn {
                    background: rgba(255,255,255,0.2); border: 2px solid rgba(208,188,255,0.6); 
                    color: #ede1f0; backdrop-filter: blur(25px);
                }
                #skipNameBtn:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
                /* MOBILE RESPONSIVE - Fix button overflow */
                @media (max-width: 600px) {
                    .name-modal-container {
                        padding: 2rem 1.5rem;
                    }
                    .name-modal-buttons {
                        flex-direction: column !important;
                        gap: 0.8rem !important;
                    }
                    .name-modal-buttons button {
                        width: 100%;
                        padding: 1rem 1.5rem;
                    }
                }
                @keyframes modalSlideIn {
                    0% { transform: scale(0.85) translateY(30px); opacity: 0; }
                    100% { transform: scale(1) translateY(0); opacity: 1; }
                }
            `;
            document.head.appendChild(style);
            
            // Attach events IMMEDIATELY
            document.getElementById('saveNameBtn').onclick = saveNameAndClose;
            document.getElementById('skipNameBtn').onclick = useDefaultName;
            
            const input = document.getElementById('nameInputModal');
            input.focus();
            input.select();
            
            // Global ESC/Enter
            const keyHandler = (e) => {
                if (e.key === 'Enter') saveNameAndClose();
                if (e.key === 'Escape') useDefaultName();
            };
            document.addEventListener('keydown', keyHandler);
            
            // Cleanup on close
            function cleanup() {
                document.removeEventListener('keydown', keyHandler);
                const style = document.querySelector('style:last-of-type');
                if (style) style.remove();
            }
            
            function saveNameAndClose() {
                const userName = input.value.trim() || 'BlazePixel';
                localStorage.setItem('userName', userName);
                cleanup();
                document.getElementById('nameModal').remove();
                updateGreeting();
            }
            
            function useDefaultName() {
                localStorage.setItem('userName', 'BlazePixel');
                cleanup();
                document.getElementById('nameModal').remove();
                updateGreeting();
            }
        }


        function handleModalKeydown(e) {
            if (!document.getElementById('nameModal')) return;
            
            if (e.key === 'Enter') {
                saveNameAndClose();
            } else if (e.key === 'Escape') {
                useDefaultName();
            }
        }

        function saveNameAndClose() {
            const nameInput = document.getElementById('nameInputModal');
            const userName = nameInput ? nameInput.value.trim() : 'BlazePixel';
            localStorage.setItem('userName', userName || 'BlazePixel');
            
            const modal = document.getElementById('nameModal');
            if (modal) modal.remove();
            
            document.removeEventListener('keydown', handleModalKeydown);
            updateGreeting();
        }

        function useDefaultName() {
            localStorage.setItem('userName', 'BlazePixel');
            
            const modal = document.getElementById('nameModal');
            if (modal) modal.remove();
            
            document.removeEventListener('keydown', handleModalKeydown);
            updateGreeting();
        }

        function saveNameAndClose() {
            const nameInput = document.getElementById('nameInput');
            const userName = nameInput.value.trim() || 'BlazePixel';
            localStorage.setItem('userName', userName);
            document.getElementById('nameModal').remove();
            updateGreeting();
        }

        function useDefaultName() {
            localStorage.setItem('userName', 'BlazePixel');
            document.getElementById('nameModal').remove();
            updateGreeting();
        }

        function updateClock() {
            const now = new Date();
            
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('time').textContent = `${h}:${m}:${s}`;
            
            const options = { weekday: 'long', month: 'short', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString(undefined, options).toUpperCase();
            
            updateGreeting(); // Sync greeting time
        }
        
        setInterval(updateClock, 60000); // Hourly for greeting
        setInterval(updateClock, 1000); // Seconds for clock
        updateClock();

        function search(event) {
            event.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            if (query) {
                // Add to history
                let history = loadSearchHistory();
                history = history.filter(h => h !== query); // Remove duplicate if exists
                history.unshift(query); // Add to beginning
                saveSearchHistory(history);
                
                // Redirect to Google search
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        }

        async function getWeather() {
            const savedLat = localStorage.getItem('weatherLat');
            const savedLon = localStorage.getItem('weatherLon');
            const savedCity = localStorage.getItem('weatherCityName');

            if (savedLat && savedLon) {
                fetchWeatherData(savedLat, savedLon, savedCity || 'Your Location');
            } else {
                if ('geolocation' in navigator) {
                    navigator.geolocation.getCurrentPosition(async (position) => {
                        const { latitude, longitude } = position.coords;
                        
                        const geoResponse = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                        const geoData = await geoResponse.json();
                        const city = geoData.address?.city || geoData.address?.town || 'Your Location';

                        localStorage.setItem('weatherLat', latitude);
                        localStorage.setItem('weatherLon', longitude);
                        localStorage.setItem('weatherCityName', city);

                        fetchWeatherData(latitude, longitude, city);
                    });
                }
            }
        }

        async function fetchWeatherData(lat, lon, cityName) {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`);
                const data = await response.json();
                
                document.getElementById('weatherTemp').textContent = `${Math.round(data.current.temperature_2m)}°`;
                document.getElementById('weatherCity').textContent = cityName.toUpperCase();
                document.getElementById('weatherDesc').textContent = getWeatherDescription(data.current.weather_code);
                document.getElementById('weatherIcon').textContent = getWeatherIcon(data.current.weather_code);
            } catch (e) {
                console.error('Weather API failed', e);
            }
        }

        function getWeatherIcon(code) {
            const icons = { 0: '☀️', 1: '🌤️', 2: '🌤️', 3: '☁️', 45: '🌫️', 48: '🌫️', 51: '🌧️', 61: '🌧️', 71: '❄️', 95: '⛈️' };
            return icons[code] || '☁️';
        }

        function getWeatherDescription(code) {
            const desc = { 0: 'Clear', 1: 'Mostly Clear', 3: 'Overcast', 45: 'Foggy', 61: 'Rainy', 71: 'Snowy', 95: 'Thunderstorm' };
            return desc[code] || 'Cloudy';
        }

        getWeather();

        // 🔋 Battery Monitor - Step 2/6 (TODO_improvements.md)
        async function initBattery() {
            const batteryWidget = document.getElementById('battery');
            const batteryPercent = document.getElementById('batteryPercent');
            const batteryStatus = document.getElementById('batteryStatus');
            const batteryIcon = document.getElementById('batteryIcon');
            
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    console.log('🔋 Battery API supported');
                    
                    function updateBatteryInfo() {
                        const level = Math.round(battery.level * 100);
                        const isCharging = battery.charging;
                        
                        batteryPercent.textContent = `${level}%`;
                        batteryStatus.textContent = isCharging ? 'Charging' : 'Discharging';
                        
                        // Dynamic icon + color based on level
                        if (level > 75) {
                            batteryIcon.textContent = '🔋'; // Full
                            batteryPercent.style.color = '#d0bcff';
                        } else if (level > 25) {
                            batteryIcon.textContent = '🪫'; // Medium  
                            batteryPercent.style.color = '#a78bfa';
                        } else {
                            batteryIcon.textContent = '🔋'; // Low (flash)
                            batteryPercent.style.color = '#ef4444';
                            batteryIcon.style.animation = 'pulse-blink 1s infinite';
                        }
                        
                        // Show widget
                        batteryWidget.classList.add('show');
                    }
                    
                    // Initial update + listen for changes
                    updateBatteryInfo();
                    battery.addEventListener('levelchange', updateBatteryInfo);
                    battery.addEventListener('chargingchange', updateBatteryInfo);
                    
                } catch (e) {
                    console.warn('Battery API error:', e);
                    batteryStatus.textContent = 'N/A';
                    batteryWidget.classList.add('show');
                }
            } else {
                console.log('🔋 No Battery API - desktop?');
                batteryStatus.textContent = 'N/A (Desktop)';
                batteryWidget.classList.add('show');
            }
        }

        // Initialize after DOM loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initBattery);
        } else {
            initBattery();
        }

        // 🔄 PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./js/startpage-sw.js')
                    .then(reg => console.log('🟢 PWA SW registered'))
                    .catch(err => console.log('🔴 SW failed:', err));
            });
        }
    </script>
