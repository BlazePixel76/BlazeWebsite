    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, columns, drops;
        const fontSize = 18;
        const characters = "01";

        function initMatrix() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / fontSize);
            drops = new Array(columns).fill(1);
        }

        function drawMatrix() {
            // Keep pure black logic for Matrix background
            ctx.fillStyle = "rgba(5, 5, 5, 0.15)"; 
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = "#10b981"; ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        initMatrix();
        setInterval(drawMatrix, 50);
        window.addEventListener('resize', initMatrix);

        function toggleDropdown() {
            document.getElementById('projectDropdown').classList.toggle('show');
            document.getElementById('arrowIcon').classList.toggle('rotate-180');
        }

        window.onclick = function(event) {
            if (!event.target.matches('#projectBtn') && !event.target.closest('#projectBtn')) {
                const d = document.getElementById('projectDropdown');
                if (d && d.classList.contains('show')) {
                    d.classList.remove('show');
                    document.getElementById('arrowIcon').classList.remove('rotate-180');
                }
            }
        }
    </script>
